<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caixa Diário — Valor Gestão</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
:root{
  --azul:#1B3A5C;--ciano:#3A9BB5;--azul-l:#EBF3FA;--cinza-f:#F4F6F9;
  --cinza-t:#2C2C2C;--cinza-m:#6B6B6B;--cinza-l:#D8DDE5;
  --verde:#1A5C38;--verde-l:#EAF4EA;--laranja:#C05000;--laranja-l:#FFF0E8;
  --vermelho:#C0392B;--vermelho-l:#FDEDEC;
}
body{background:#f0f4f8;color:var(--cinza-t);font-size:13px;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:12px}

/* HEADER */
.header{background:var(--azul);color:#fff;padding:12px 16px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:13px;font-weight:700}
.header .user{font-size:11px;color:#aac}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;transition:.15s}
.logout-btn:hover{background:rgba(255,255,255,.25)}

/* LOGIN */
.login-panel{background:#fff;border-radius:8px;padding:24px;border:1px solid var(--cinza-l);max-width:400px;margin:40px auto}
.login-panel h2{font-size:16px;color:var(--azul);margin-bottom:16px;text-align:center}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--cinza-m);margin-bottom:4px;text-transform:uppercase}
.field input{width:100%;padding:8px 10px;border:1px solid var(--cinza-l);border-radius:5px;font-size:13px}
.field input:focus{outline:none;border-color:var(--ciano)}
.btn-login{width:100%;padding:10px;background:var(--azul);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-login:hover{background:#2B5A8A}
.error-msg{background:var(--vermelho-l);color:var(--vermelho);padding:8px 12px;border-radius:5px;margin-bottom:12px;font-size:11.5px}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--azul);padding:0 8px;margin-bottom:0}
.tab{padding:8px 12px;cursor:pointer;font-size:11.5px;font-weight:700;color:#aac;border-radius:6px 6px 0 0;white-space:nowrap;transition:.15s}
.tab.active{background:#fff;color:var(--azul)}

/* PAINEL */
.panel{display:none;background:#fff;border-radius:0 8px 8px 8px;padding:16px;border:1px solid var(--cinza-l)}
.panel.active{display:block}

.sec-title{font-size:12px;font-weight:700;color:var(--azul);border-bottom:2px solid var(--ciano);padding-bottom:4px;margin-bottom:10px}

/* FORMULÁRIO DE LANÇAMENTO */
.lancamento-form{background:var(--cinza-f);border-radius:8px;padding:12px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;font-weight:700;color:var(--cinza-m);text-transform:uppercase;letter-spacing:.3px}
.field input,.field select{padding:6px 8px;border:1px solid var(--cinza-l);border-radius:5px;font-size:12px;color:var(--cinza-t)}
.field input:focus,.field select:focus{outline:none;border-color:var(--ciano)}
.btn-lancar{background:var(--azul);color:#fff;padding:8px 14px;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer}
.btn-lancar:hover{background:#2B5A8A}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi{border-radius:6px;padding:10px 12px;text-align:center;border:1px solid var(--cinza-l)}
.kpi .val{font-size:16px;font-weight:700;line-height:1.2}
.kpi .lbl{font-size:10px;color:var(--cinza-m);margin-top:2px;text-transform:uppercase}
.kpi.vd{background:var(--verde-l);border-color:#a8d5b8}.kpi.vd .val{color:var(--verde)}
.kpi.vm{background:var(--vermelho-l);border-color:#f0a8a8}.kpi.vm .val{color:var(--vermelho)}
.kpi.az{background:var(--azul-l);border-color:#a8c8e8}.kpi.az .val{color:var(--azul)}

/* LANÇAMENTOS */
.lancamentos-list{max-height:400px;overflow-y:auto}
.lancamento-item{background:#fff;border:1px solid var(--cinza-l);border-radius:6px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.lancamento-info{flex:1}
.lancamento-info .tipo{font-size:11px;font-weight:700;color:var(--azul);text-transform:uppercase;letter-spacing:.3px}
.lancamento-info .desc{font-size:12px;color:var(--cinza-t);margin:2px 0}
.lancamento-info .cat{font-size:10px;color:var(--cinza-m)}
.lancamento-valor{text-align:right}
.lancamento-valor .valor{font-size:13px;font-weight:700}
.lancamento-valor .data{font-size:10px;color:var(--cinza-m)}
.entrada .valor{color:var(--verde)}
.saida .valor{color:var(--vermelho)}
.btn-del{background:var(--vermelho-l);color:var(--vermelho);border:none;border-radius:3px;padding:2px 6px;font-size:10px;cursor:pointer;margin-top:2px}

.empty{text-align:center;padding:20px;color:var(--cinza-m);font-size:12px}
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div id="login-container" class="login-panel">
  <h2>Caixa Diário — Valor</h2>
  <div id="error-msg"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="seu@email.com">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="****">
  </div>
  <button class="btn-login" onclick="fazerLogin()">Entrar</button>
  <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--cinza-m)">
    Primeira vez? <a href="#" onclick="abrirCadastro();return false" style="color:var(--ciano);text-decoration:none">Cadastre-se aqui</a>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app-container" style="display:none">

<div class="header">
  <h1>💰 Caixa Diário</h1>
  <div style="text-align:right">
    <div class="user" id="cliente-nome">Studio Casa d'Rara</div>
    <button class="logout-btn" onclick="fazerLogout()">Sair</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('lancamentos')">📊 Lançamentos</div>
  <div class="tab" onclick="switchTab('resumo')">📈 Resumo</div>
</div>

<!-- LANÇAMENTOS -->
<div id="tab-lancamentos" class="panel active">
  <div class="sec-title">Novo Lançamento</div>
  <div class="lancamento-form">
    <div class="g2">
      <div class="field">
        <label>Tipo</label>
        <select id="tipo-lanc">
          <option value="entrada">📍 Entrada</option>
          <option value="saida">📍 Saída</option>
        </select>
      </div>
      <div class="field">
        <label>Valor (R$)</label>
        <input type="number" id="valor-lanc" placeholder="0.00" step="0.01">
      </div>
    </div>
    <div class="field">
      <label>Categoria</label>
      <select id="categoria-lanc">
        <option value="faturamento">Faturamento / Vendas</option>
        <option value="cartao">Cartão a Receber</option>
        <option value="insumos">Insumos / Produtos</option>
        <option value="comissao">Comissões / Folha</option>
        <option value="aluguel">Aluguel</option>
        <option value="energia">Energia / Água</option>
        <option value="fornecedor">Fornecedor</option>
        <option value="imposto">Impostos</option>
        <option value="outro">Outro</option>
      </select>
    </div>
    <div class="field">
      <label>Descrição (opcional)</label>
      <input type="text" id="desc-lanc" placeholder="Ex: Coloração Ana Paula">
    </div>
    <button class="btn-lancar" onclick="lancarMovimento()">✓ Lançar</button>
  </div>

  <div class="sec-title">Lançamentos de Hoje</div>
  <div class="lancamentos-list" id="lista-lancamentos">
    <div class="empty">Nenhum lançamento ainda</div>
  </div>
</div>

<!-- RESUMO -->
<div id="tab-resumo" class="panel">
  <div class="sec-title">Resumo do Mês</div>
  <div class="kgrid">
    <div class="kpi vd">
      <div class="val" id="total-entrada">R$ 0</div>
      <div class="lbl">Entradas</div>
    </div>
    <div class="kpi vm">
      <div class="val" id="total-saida">R$ 0</div>
      <div class="lbl">Saídas</div>
    </div>
    <div class="kpi az">
      <div class="val" id="saldo-final">R$ 0</div>
      <div class="lbl">Saldo</div>
    </div>
  </div>

  <div class="sec-title">Entradas por Categoria</div>
  <div id="entradas-cat" style="margin-bottom:16px"></div>

  <div class="sec-title">Saídas por Categoria</div>
  <div id="saidas-cat"></div>
</div>

</div><!-- /app-container -->

</div><!-- /app -->

<script>
// ════════ FIREBASE CONFIG ════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyD...",
  authDomain: "appsdevalor-financeiro.firebaseapp.com",
  projectId: "appsdevalor-financeiro",
  storageBucket: "appsdevalor-financeiro.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef..."
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let usuarioAtual = null;
let clienteId = null;

// ════════ ESTADO ════════════════════════════════════════════
let lancamentosHoje = [];

// ════════ AUTH ════════════════════════════════════════════
function fazerLogin(){
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  
  if(!email || !senha){
    mostrarErro('Preencha email e senha');
    return;
  }

  auth.signInWithEmailAndPassword(email, senha)
    .then(user => {
      usuarioAtual = user.user;
      clienteId = user.user.uid;
      carregarDados();
      document.getElementById('login-container').style.display = 'none';
      document.getElementById('app-container').style.display = 'block';
    })
    .catch(error => {
      if(error.code === 'auth/user-not-found'){
        mostrarErro('Usuário não encontrado. Cadastre-se primeiro.');
      } else if(error.code === 'auth/wrong-password'){
        mostrarErro('Senha incorreta');
      } else {
        mostrarErro('Erro: ' + error.message);
      }
    });
}

function abrirCadastro(){
  const email = prompt('Digite seu email:');
  if(!email) return;
  
  const senha = prompt('Crie uma senha (mínimo 6 caracteres):');
  if(!senha || senha.length<6){
    alert('Senha deve ter no mínimo 6 caracteres');
    return;
  }

  const nomeEmpresa = prompt('Nome da sua empresa/studio:');
  if(!nomeEmpresa) return;

  auth.createUserWithEmailAndPassword(email, senha)
    .then(user => {
      return db.collection('clientes').doc(user.user.uid).set({
        email: email,
        nome: nomeEmpresa,
        dataCriacao: new Date(),
        tipo: 'salao' // ou 'varejo', 'industrial' etc.
      });
    })
    .then(() => {
      alert('Cadastro realizado! Agora faça login.');
      document.getElementById('email').value = email;
      document.getElementById('senha').value = '';
    })
    .catch(error => {
      if(error.code === 'auth/email-already-in-use'){
        mostrarErro('Este email já está cadastrado');
      } else {
        mostrarErro('Erro: ' + error.message);
      }
    });
}

function fazerLogout(){
  auth.signOut().then(() => {
    usuarioAtual = null;
    document.getElementById('login-container').style.display = 'block';
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('email').value = '';
    document.getElementById('senha').value = '';
  });
}

function mostrarErro(msg){
  const el = document.getElementById('error-msg');
  el.innerHTML = `<div class="error-msg">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 5000);
}

// ════════ DADOS ════════════════════════════════════════════
function carregarDados(){
  if(!clienteId) return;

  // Carregar nome da empresa
  db.collection('clientes').doc(clienteId).get()
    .then(doc => {
      if(doc.exists){
        document.getElementById('cliente-nome').textContent = doc.data().nome;
      }
    });

  // Carregar lançamentos de hoje
  const hoje = new Date();
  const dataStr = hoje.toISOString().split('T')[0];

  db.collection('clientes').doc(clienteId).collection('lancamentos')
    .where('data', '>=', dataStr + 'T00:00:00')
    .where('data', '<=', dataStr + 'T23:59:59')
    .orderBy('data', 'desc')
    .onSnapshot(snapshot => {
      lancamentosHoje = [];
      snapshot.forEach(doc => {
        lancamentosHoje.push({...doc.data(), id: doc.id});
      });
      renderLancamentos();
      atualizarResumo();
    });
}

function lancarMovimento(){
  if(!clienteId) return;

  const tipo = document.getElementById('tipo-lanc').value;
  const valor = parseFloat(document.getElementById('valor-lanc').value);
  const categoria = document.getElementById('categoria-lanc').value;
  const descricao = document.getElementById('desc-lanc').value;

  if(!valor || valor<=0){
    alert('Digite um valor válido');
    return;
  }

  const agora = new Date();
  const id = agora.getTime() + '-' + Math.random().toString(36).substr(2,9);

  db.collection('clientes').doc(clienteId).collection('lancamentos').doc(id).set({
    tipo: tipo,
    valor: valor,
    categoria: categoria,
    descricao: descricao,
    data: agora.toISOString(),
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    document.getElementById('valor-lanc').value = '';
    document.getElementById('desc-lanc').value = '';
    document.getElementById('tipo-lanc').value = 'entrada';
  }).catch(error => alert('Erro ao lançar: ' + error.message));
}

function renderLancamentos(){
  const el = document.getElementById('lista-lancamentos');
  
  if(lancamentosHoje.length === 0){
    el.innerHTML = '<div class="empty">Nenhum lançamento hoje</div>';
    return;
  }

  el.innerHTML = lancamentosHoje.map(l => {
    const data = new Date(l.data);
    const hora = data.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    const cls = l.tipo === 'entrada' ? 'entrada' : 'saida';
    const sinal = l.tipo === 'entrada' ? '+' : '-';

    return `
      <div class="lancamento-item ${cls}">
        <div class="lancamento-info">
          <div class="tipo">${l.tipo === 'entrada' ? '↓ ENTRADA' : '↑ SAÍDA'}</div>
          <div class="desc">${l.descricao || '(sem descrição)'}</div>
          <div class="cat">${l.categoria}</div>
        </div>
        <div class="lancamento-valor">
          <div class="valor">${sinal} R$ ${l.valor.toFixed(2)}</div>
          <div class="data">${hora}</div>
          <button class="btn-del" onclick="deletarLancamento('${l.id}')">Deletar</button>
        </div>
      </div>`;
  }).join('');
}

function deletarLancamento(id){
  if(!confirm('Deletar este lançamento?')) return;
  
  db.collection('clientes').doc(clienteId).collection('lancamentos').doc(id).delete()
    .catch(error => alert('Erro: ' + error.message));
}

function atualizarResumo(){
  const entradas = lancamentosHoje
    .filter(l => l.tipo === 'entrada')
    .reduce((a, l) => a + l.valor, 0);
  
  const saidas = lancamentosHoje
    .filter(l => l.tipo === 'saida')
    .reduce((a, l) => a + l.valor, 0);
  
  const saldo = entradas - saidas;

  document.getElementById('total-entrada').textContent = 'R$ ' + fmt(entradas);
  document.getElementById('total-saida').textContent = 'R$ ' + fmt(saidas);
  document.getElementById('saldo-final').textContent = 'R$ ' + fmt(saldo);

  // Resumo por categoria
  const entCat = {}, saiCat = {};
  lancamentosHoje.forEach(l => {
    if(l.tipo === 'entrada'){
      entCat[l.categoria] = (entCat[l.categoria] || 0) + l.valor;
    } else {
      saiCat[l.categoria] = (saiCat[l.categoria] || 0) + l.valor;
    }
  });

  document.getElementById('entradas-cat').innerHTML = Object.entries(entCat)
    .map(([cat, val]) => `<div style="padding:6px 0;border-bottom:1px solid var(--cinza-l);display:flex;justify-content:space-between">
      <span style="font-size:12px">${cat}</span>
      <span style="font-weight:700;color:var(--verde)">R$ ${fmt(val)}</span></div>`)
    .join('') || '<div class="empty">Sem entradas hoje</div>';

  document.getElementById('saidas-cat').innerHTML = Object.entries(saiCat)
    .map(([cat, val]) => `<div style="padding:6px 0;border-bottom:1px solid var(--cinza-l);display:flex;justify-content:space-between">
      <span style="font-size:12px">${cat}</span>
      <span style="font-weight:700;color:var(--vermelho)">R$ ${fmt(val)}</span></div>`)
    .join('') || '<div class="empty">Sem saídas hoje</div>';
}

// ════════ HELPERS ════════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

const fmt = n => Math.round(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});

// ════════ INIT ════════════════════════════════════════════
auth.onAuthStateChanged(user => {
  if(user){
    usuarioAtual = user;
    clienteId = user.uid;
    carregarDados();
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('app-container').style.display = 'block';
  }
});
</script>
</body>
</html>
