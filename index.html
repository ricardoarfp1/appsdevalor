<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Financeira — Studio Casa d'Rara</title>

<!-- Firebase v9 compat (funciona com sintaxe antiga) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#f0f4f8;font-size:13px;color:#2C2C2C}
.wrap{max-width:900px;margin:0 auto;padding:10px}

/* LOGIN */
.login-box{background:#fff;border-radius:8px;padding:28px;max-width:380px;margin:50px auto;border:1px solid #D8DDE5}
.login-box h2{color:#1B3A5C;font-size:16px;text-align:center;margin-bottom:18px}
.f-label{font-size:10px;font-weight:700;color:#6B6B6B;text-transform:uppercase;display:block;margin-bottom:3px;margin-top:10px}
.f-input{width:100%;padding:8px 10px;border:1px solid #D8DDE5;border-radius:5px;font-size:13px}
.f-input:focus{outline:none;border-color:#3A9BB5}
.btn-p{width:100%;padding:10px;background:#1B3A5C;color:#fff;border:none;border-radius:5px;font-weight:700;cursor:pointer;margin-top:14px;font-size:12px}
.btn-p:hover{background:#2B5A8A}
.err{background:#FDEDEC;color:#C0392B;padding:8px;border-radius:5px;margin-top:10px;font-size:11.5px}
.link{color:#3A9BB5;text-decoration:none;cursor:pointer}
.hint{text-align:center;margin-top:10px;font-size:11px;color:#6B6B6B}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1B3A5C,#C4547A);color:#fff;padding:13px 18px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:14px;font-weight:700}
.hdr-sub{font-size:10px;color:#dde;margin-top:2px}
.btn-sair{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer}

/* TABS */
.tabs{display:flex;background:#1B3A5C;padding:0 8px;gap:2px}
.tab{padding:8px 12px;color:#aac;font-size:11.5px;font-weight:700;cursor:pointer;border-radius:6px 6px 0 0}
.tab.on{background:#fff;color:#1B3A5C}

/* PAINEL */
.painel{display:none;background:#fff;border-radius:0 8px 8px 8px;padding:16px;border:1px solid #D8DDE5}
.painel.on{display:block}
.sec{font-size:12px;font-weight:700;color:#1B3A5C;border-bottom:2px solid #3A9BB5;padding-bottom:4px;margin:14px 0 10px}
.sec:first-child{margin-top:0}

/* FORM LANÇAMENTO */
.form-box{background:#F4F6F9;border-radius:6px;padding:12px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.f-sel{width:100%;padding:6px 8px;border:1px solid #D8DDE5;border-radius:5px;font-size:12px}
.btn-lanc{background:#1B3A5C;color:#fff;padding:8px 16px;border:none;border-radius:5px;font-weight:700;cursor:pointer;font-size:12px;margin-top:8px}

/* KPIS */
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi{border-radius:6px;padding:10px;text-align:center;border:1px solid #D8DDE5}
.kpi .v{font-size:15px;font-weight:700}
.kpi .l{font-size:10px;color:#6B6B6B;margin-top:2px;text-transform:uppercase}
.kpi.g{background:#EAF4EA}.kpi.g .v{color:#1A5C38}
.kpi.r{background:#FDEDEC}.kpi.r .v{color:#C0392B}
.kpi.b{background:#EBF3FA}.kpi.b .v{color:#1B3A5C}

/* LISTA */
.item{padding:8px;border-bottom:1px solid #F4F6F9;display:flex;justify-content:space-between;align-items:center}
.item-tipo{font-size:10px;font-weight:700}
.item-desc{font-size:12px;margin:2px 0}
.item-cat{font-size:10px;color:#6B6B6B}
.item-val{font-weight:700;text-align:right}
.item-hora{font-size:10px;color:#6B6B6B}
.verde{color:#1A5C38}.vermelho{color:#C0392B}
.vazio{text-align:center;padding:20px;color:#6B6B6B;font-size:12px}

/* DIAG */
.dc{border-radius:6px;padding:10px 14px;margin-bottom:8px;border-left:4px solid}
.dc.ok{background:#EAF4EA;border-color:#1A5C38}.dc.ok h4{color:#1A5C38}
.dc.at{background:#FFF0E8;border-color:#C05000}.dc.at h4{color:#C05000}
.dc.cr{background:#FDEDEC;border-color:#C0392B}.dc.cr h4{color:#C0392B}
.dc h4{font-size:12px;font-weight:700;margin-bottom:4px}
.dc p{font-size:11.5px;line-height:1.5}
</style>
</head>
<body>

<div class="wrap">
  <div id="root">Carregando...</div>
</div>

<script>
// ── FIREBASE ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyD5ojzJug2TlenmqJoV3SZfpLjKt1BoCdc",
  authDomain: "appsdevalor-financeiro.firebaseapp.com",
  projectId: "appsdevalor-financeiro",
  storageBucket: "appsdevalor-financeiro.firebasestorage.app",
  messagingSenderId: "498844691824",
  appId: "1:498844691824:web:f03a3386abdfc6d63773b5"
};

firebase.initializeApp(firebaseConfig);
const auth  = firebase.auth();
const db    = firebase.firestore();

// ── ESTADO ───────────────────────────────────────────────
let uid = null;
let hoje_lanc = [];

// ── RENDER HELPERS ────────────────────────────────────────
const root = () => document.getElementById('root');
const fmt  = v => Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

// ── TELA LOGIN ────────────────────────────────────────────
function telaLogin(msg){
  root().innerHTML = `
    <div class="login-box">
      <h2>✂️ Studio Casa d'Rara<br><small style="font-size:11px;color:#6B6B6B">Gestão Financeira</small></h2>
      ${msg ? `<div class="err">${msg}</div>` : ''}
      <label class="f-label">Email</label>
      <input class="f-input" id="u-email" type="email" placeholder="seu@email.com">
      <label class="f-label">Senha</label>
      <input class="f-input" id="u-senha" type="password" placeholder="••••••">
      <button class="btn-p" onclick="doLogin()">Entrar</button>
      <div class="hint">Primeira vez? <a class="link" onclick="doCadastro()">Cadastre-se aqui</a></div>
    </div>`;
}

// ── TELA APP ──────────────────────────────────────────────
function telaApp(nomeEmpresa){
  root().innerHTML = `
    <div class="hdr">
      <div>
        <h1>✂️ Gestão Financeira</h1>
        <div class="hdr-sub">${nomeEmpresa}</div>
      </div>
      <button class="btn-sair" onclick="doLogout()">Sair</button>
    </div>
    <div class="tabs">
      <div class="tab on" onclick="mudarTab('caixa',this)">💰 Caixa</div>
      <div class="tab" onclick="mudarTab('dre',this)">📊 DRE</div>
      <div class="tab" onclick="mudarTab('diag',this)">🔍 Diagnóstico</div>
    </div>
    <div id="tab-caixa" class="painel on">
      <div class="sec">Novo Lançamento</div>
      <div class="form-box">
        <div class="g2">
          <div>
            <label class="f-label">Tipo</label>
            <select class="f-sel" id="f-tipo">
              <option value="entrada">↓ Entrada</option>
              <option value="saida">↑ Saída</option>
            </select>
          </div>
          <div>
            <label class="f-label">Valor (R$)</label>
            <input class="f-input" id="f-valor" type="number" placeholder="0,00" step="0.01" min="0">
          </div>
        </div>
        <label class="f-label">Categoria</label>
        <select class="f-sel" id="f-cat">
          <option value="faturamento">Faturamento / Vendas</option>
          <option value="cartao">Cartão a Receber</option>
          <option value="insumos">Insumos / Produtos</option>
          <option value="comissao">Comissões / Folha</option>
          <option value="aluguel">Aluguel</option>
          <option value="energia">Energia / Água</option>
          <option value="outro">Outro</option>
        </select>
        <label class="f-label">Descrição (opcional)</label>
        <input class="f-input" id="f-desc" type="text" placeholder="Ex: Coloração Ana Paula">
        <button class="btn-lanc" onclick="doLancar()">✓ Lançar</button>
      </div>
      <div class="sec">Resumo de Hoje</div>
      <div class="krow">
        <div class="kpi g"><div class="v" id="k-ent">R$ 0,00</div><div class="l">Entradas</div></div>
        <div class="kpi r"><div class="v" id="k-sai">R$ 0,00</div><div class="l">Saídas</div></div>
        <div class="kpi b"><div class="v" id="k-sal">R$ 0,00</div><div class="l">Saldo Hoje</div></div>
      </div>
      <div class="sec">Lançamentos de Hoje</div>
      <div id="lista"></div>
    </div>
    <div id="tab-dre" class="painel">
      <div class="sec">DRE Gerencial — Últimos 30 Dias</div>
      <div id="dre-c"><div class="vazio">Sem dados ainda</div></div>
    </div>
    <div id="tab-diag" class="painel">
      <div class="sec">Diagnóstico Financeiro</div>
      <div id="diag-c"><div class="vazio">Sem dados ainda</div></div>
    </div>`;

  escutarHoje();
  escutar30dias();
}

// ── AUTH ──────────────────────────────────────────────────
function doLogin(){
  const email = document.getElementById('u-email').value.trim();
  const senha = document.getElementById('u-senha').value;
  if(!email || !senha){ telaLogin('Preencha email e senha'); return; }

  auth.signInWithEmailAndPassword(email, senha)
    .catch(e => telaLogin('Erro: ' + e.message));
}

function doCadastro(){
  const email = prompt('Seu email:');
  if(!email) return;
  const senha = prompt('Crie uma senha (mín. 6 caracteres):');
  if(!senha || senha.length < 6){ alert('Senha deve ter no mínimo 6 caracteres'); return; }
  const nome  = prompt('Nome do seu studio/empresa:');
  if(!nome) return;

  auth.createUserWithEmailAndPassword(email, senha)
    .then(c => db.collection('clientes').doc(c.user.uid).set({
      email, nome, tipo:'salao', criado: new Date().toISOString()
    }))
    .then(() => { alert('Cadastro realizado! Agora faça login.'); })
    .catch(e => alert('Erro no cadastro: ' + e.message));
}

function doLogout(){
  auth.signOut();
}

// ── DADOS ─────────────────────────────────────────────────
function escutarHoje(){
  const d = new Date().toISOString().split('T')[0];
  db.collection('clientes').doc(uid).collection('lancamentos')
    .where('data','>=', d+'T00:00:00')
    .where('data','<=', d+'T23:59:59')
    .orderBy('data','desc')
    .onSnapshot(snap => {
      hoje_lanc = snap.docs.map(d => ({...d.data(), id:d.id}));
      renderCaixa();
    });
}

function escutar30dias(){
  const d30 = new Date();
  d30.setDate(d30.getDate()-30);
  db.collection('clientes').doc(uid).collection('lancamentos')
    .where('data','>=', d30.toISOString().split('T')[0]+'T00:00:00')
    .orderBy('data','desc')
    .onSnapshot(snap => {
      const lanc = snap.docs.map(d => ({...d.data(), id:d.id}));
      renderDRE(lanc);
      renderDiag(lanc);
    });
}

function doLancar(){
  const tipo  = document.getElementById('f-tipo').value;
  const valor = parseFloat(document.getElementById('f-valor').value);
  const cat   = document.getElementById('f-cat').value;
  const desc  = document.getElementById('f-desc').value;

  if(!valor || valor <= 0){ alert('Digite um valor válido'); return; }

  const id = Date.now()+'-'+Math.random().toString(36).substr(2,8);
  db.collection('clientes').doc(uid).collection('lancamentos').doc(id).set({
    tipo, valor, categoria:cat, descricao:desc,
    data: new Date().toISOString(),
    ts: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    document.getElementById('f-valor').value = '';
    document.getElementById('f-desc').value  = '';
  }).catch(e => alert('Erro: '+e.message));
}

// ── RENDER CAIXA ─────────────────────────────────────────
function renderCaixa(){
  const ent = hoje_lanc.filter(l=>l.tipo==='entrada').reduce((a,l)=>a+l.valor,0);
  const sai = hoje_lanc.filter(l=>l.tipo==='saida').reduce((a,l)=>a+l.valor,0);
  const sal = ent - sai;

  document.getElementById('k-ent').textContent = 'R$ '+fmt(ent);
  document.getElementById('k-sai').textContent = 'R$ '+fmt(sai);
  document.getElementById('k-sal').textContent = 'R$ '+fmt(sal);
  document.getElementById('k-sal').style.color = sal >= 0 ? '#1A5C38' : '#C0392B';

  const lista = document.getElementById('lista');
  if(!lista) return;

  if(hoje_lanc.length === 0){
    lista.innerHTML = '<div class="vazio">Nenhum lançamento hoje</div>';
    return;
  }

  lista.innerHTML = hoje_lanc.map(l => {
    const hora = new Date(l.data).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const cor  = l.tipo==='entrada' ? 'verde' : 'vermelho';
    const sinal= l.tipo==='entrada' ? '+' : '-';
    return `<div class="item">
      <div>
        <div class="item-tipo ${cor}">${l.tipo==='entrada'?'↓ ENTRADA':'↑ SAÍDA'}</div>
        <div class="item-desc">${l.descricao||'(sem descrição)'}</div>
        <div class="item-cat">${l.categoria}</div>
      </div>
      <div>
        <div class="item-val ${cor}">${sinal} R$ ${fmt(l.valor)}</div>
        <div class="item-hora">${hora}</div>
      </div>
    </div>`;
  }).join('');
}

// ── RENDER DRE ────────────────────────────────────────────
function renderDRE(lanc){
  const el = document.getElementById('dre-c');
  if(!el) return;
  const ent = lanc.filter(l=>l.tipo==='entrada').reduce((a,l)=>a+l.valor,0);
  const sai = lanc.filter(l=>l.tipo==='saida').reduce((a,l)=>a+l.valor,0);
  const sal = ent - sai;
  el.innerHTML = `
    <div class="krow">
      <div class="kpi g"><div class="v">R$ ${fmt(ent)}</div><div class="l">Entradas</div></div>
      <div class="kpi r"><div class="v">R$ ${fmt(sai)}</div><div class="l">Saídas</div></div>
      <div class="kpi b"><div class="v">R$ ${fmt(sal)}</div><div class="l">Saldo 30 dias</div></div>
    </div>
    <div style="background:#F4F6F9;border-radius:6px;padding:10px;font-size:12px;line-height:1.6">
      <strong>Análise:</strong> Faturamento de <strong>R$ ${fmt(ent)}</strong> nos últimos 30 dias
      com despesas de <strong>R$ ${fmt(sai)}</strong>.
      ${sal>=0
        ? `<span style="color:#1A5C38">Saldo positivo de R$ ${fmt(sal)}.</span>`
        : `<span style="color:#C0392B">Déficit de R$ ${fmt(Math.abs(sal))}. Atenção urgente!</span>`}
    </div>`;
}

// ── RENDER DIAGNÓSTICO ────────────────────────────────────
function renderDiag(lanc){
  const el = document.getElementById('diag-c');
  if(!el) return;
  const ent = lanc.filter(l=>l.tipo==='entrada').reduce((a,l)=>a+l.valor,0);
  const sai = lanc.filter(l=>l.tipo==='saida').reduce((a,l)=>a+l.valor,0);
  const sal = ent - sai;
  const margem = ent > 0 ? (sal/ent)*100 : 0;

  const cards = [];

  if(sal < 0)
    cards.push({t:'cr', h:'🔴 Resultado Negativo', p:`Saídas (R$ ${fmt(sai)}) maiores que entradas (R$ ${fmt(ent)}). Déficit de R$ ${fmt(Math.abs(sal))}.`});
  else if(margem < 15)
    cards.push({t:'at', h:'🟡 Margem Apertada', p:`Margem de ${margem.toFixed(1)}% está abaixo do mínimo saudável (15%). Revisar despesas.`});
  else
    cards.push({t:'ok', h:'🟢 Operação Saudável', p:`Margem de ${margem.toFixed(1)}% indica boa gestão financeira. Continue monitorando.`});

  if(lanc.length < 10)
    cards.push({t:'at', h:'🟡 Poucos Lançamentos', p:'Lançamentos diários são essenciais para diagnóstico preciso. Lance todo dia!'});

  el.innerHTML = cards.map(c=>`<div class="dc ${c.t}"><h4>${c.h}</h4><p>${c.p}</p></div>`).join('');
}

// ── TAB ───────────────────────────────────────────────────
function mudarTab(id, el){
  document.querySelectorAll('.painel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+id).classList.add('on');
  el.classList.add('on');
}

// ── AUTH STATE ────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if(user){
    uid = user.uid;
    db.collection('clientes').doc(uid).get().then(doc => {
      const nome = doc.exists ? doc.data().nome : user.email;
      telaApp(nome);
    });
  } else {
    uid = null;
    telaLogin();
  }
});
</script>
</body>
</html>
